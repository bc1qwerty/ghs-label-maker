<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="triangleGrad" x1="600" y1="120" x2="600" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none"/>
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle radial glow behind triangle -->
  <ellipse cx="600" cy="200" rx="200" ry="160" fill="#FACC15" opacity="0.04"/>

  <!-- Warning Triangle (scaled up from favicon) -->
  <g transform="translate(600, 195)" filter="url(#glow)">
    <polygon points="0,-110 120,100 -120,100" fill="url(#triangleGrad)" stroke="#CA8A04" stroke-width="4" stroke-linejoin="round"/>
    <rect x="-9" y="-60" width="18" height="80" rx="9" fill="#1a1a1a"/>
    <circle cx="0" cy="46" r="11" fill="#1a1a1a"/>
  </g>

  <!-- Title -->
  <text x="600" y="365" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="0.5">GHS &amp; Transport Label Generator</text>

  <!-- Subtitle -->
  <text x="600" y="405" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#9ca3af" letter-spacing="1">AI-Powered MSDS Safety Label Maker</text>

  <!-- Feature Pills -->
  <g transform="translate(600, 465)">
    <!-- Pill 1: 10 Languages -->
    <g transform="translate(-340, 0)">
      <rect x="-68" y="-16" width="136" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#d1d5db" font-weight="500">10 Languages</text>
    </g>
    <!-- Pill 2: Batch Processing -->
    <g transform="translate(-130, 0)">
      <rect x="-78" y="-16" width="156" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#d1d5db" font-weight="500">Batch Processing</text>
    </g>
    <!-- Pill 3: PDF Download -->
    <g transform="translate(90, 0)">
      <rect x="-68" y="-16" width="136" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#d1d5db" font-weight="500">PDF Download</text>
    </g>
    <!-- Pill 4: Lightning Payments -->
    <g transform="translate(310, 0)">
      <rect x="-85" y="-16" width="170" height="32" rx="16" fill="#FACC15" fill-opacity="0.12" stroke="#FACC15" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#FACC15" font-weight="500">&#x26A1; Lightning Payments</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="550" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="14" fill="#6b7280" letter-spacing="2">ghs.txid.uk</text>

  <!-- Thin accent line at bottom -->
  <rect x="480" y="565" width="240" height="1.5" rx="0.75" fill="#FACC15" opacity="0.3"/>
</svg>
